name: Sync Docs to Rendro

on:
  push:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync docs to Rendro
        env:
          RENDRO_API_KEY: ${{ secrets.RENDRO_API_KEY }}
        run: |
          npx --yes rendro@latest push \
            --source ./docs \
            --org gmail \
            --repo rendro-test \
            --endpoint https://dev.rendro.app
